<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>between the spaces - tymmo p</title>
    <meta
      name="description"
      content="between the spaces — an interactive audio-visual drive by tymmo p. Press play and ride."
    />
    <link rel="canonical" href="https://tymmop.com/" />
    <meta name="theme-color" content="#000000" />

    <!-- Speed up first audio byte (media host) + analytics -->
    <link rel="preconnect" href="https://media.tymmop.com" />
    <link rel="preconnect" href="https://cloud.umami.is" />

    <!-- Icons -->
    <link rel="icon" href="assets/favicon-gunmetal/favicon.ico?v=2" sizes="any" />
    <link
      rel="icon"
      href="assets/favicon-gunmetal/favicon.svg?v=2"
      type="image/svg+xml"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/favicon-gunmetal/favicon-32.png?v=2"
    />
    <link
      rel="apple-touch-icon"
      href="assets/favicon-gunmetal/apple-touch-icon-180.png?v=2"
    />

    <!-- Social share cards -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="between the spaces - tymmo p" />
    <meta
      property="og:description"
      content="An interactive audio-visual drive by tymmo p. Press play and ride."
    />
    <meta property="og:url" content="https://tymmop.com/" />
    <meta property="og:image" content="https://tymmop.com/assets/og-card.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="between the spaces - tymmo p" />
    <meta
      name="twitter:description"
      content="An interactive audio-visual drive by tymmo p. Press play and ride."
    />
    <meta name="twitter:image" content="https://tymmop.com/assets/og-card.jpg" />

    <link rel="stylesheet" href="styles.css" />
    <script
      defer
      src="https://cloud.umami.is/script.js"
      data-website-id="26e7c57d-b820-4524-b388-9dec54c96083"
    ></script>

  </head>
  <body>
    <main>
      <h1 class="visually-hidden">between the spaces — music by tymmo p</h1>
      <video
        id="backgroundVideoPrimary"
        class="background-media background-video"
        playsinline
        muted
        preload="auto"
        poster="assets/road-poster.jpg"
        aria-hidden="true"
      ></video>
      <video
        id="backgroundVideoSecondary"
        class="background-media background-video"
        playsinline
        muted
        preload="auto"
        poster="assets/road-poster.jpg"
        aria-hidden="true"
      ></video>
      <img
        id="backgroundFallback"
        class="background-media"
        src="assets/road-poster.jpg"
        alt=""
        aria-hidden="true"
      />

      <div class="overlay-stage">
        <div class="overlay-wrapper" id="overlayWrapper">
          <picture class="overlay-picture">
            <source srcset="assets/overlay-car.webp" type="image/webp" />
            <img
              id="overlayImage"
              class="overlay-image"
              src="assets/overlay-car.png"
              alt="Car interior dashboard overlay"
              draggable="false"
            />
          </picture>

          <div
            class="player-shell"
            role="region"
            aria-label="Audio player"
            id="playerShell"
          >
            <!-- Player header: status badge + artist + timer -->
            <div class="track-info">
              <div class="track-info__meta">
                <!-- track-info__label shows "Paused" / "Now Playing" -->
                <span class="track-info__label" id="trackStatus" aria-live="polite">Paused</span>
                <!-- track-info__artist renders the current artist name -->
                <span class="track-info__artist" id="trackArtist">tymmo p</span>
              </div>
              <!-- time-display shows current position and total duration -->
              <span class="time-display"
                ><span id="currentTime">0:00</span>
                <span aria-hidden="true">/</span>
                <span id="duration">0:00</span></span
              >
              <!-- share-button is shown only in the docked (mobile) layout;
                   desktop shares via the synced ?track= address bar -->
              <button
                type="button"
                id="shareButton"
                class="share-button"
                aria-label="Share this song"
                title="Share"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"
                  />
                </svg>
              </button>
            </div>
            <!-- track-title marquee wraps the currently playing song -->
            <span class="track-title" id="trackTitleContainer">
              <span class="track-title__inner" id="trackTitleInner">
                <span class="track-title__text" id="trackTitle">Loading...</span>
                <span
                  class="track-title__text track-title__text--clone"
                  id="trackTitleClone"
                  aria-hidden="true"
                ></span>
              </span>
            </span>
            <!-- progress shows playback position; click or drag to seek -->
            <div class="progress" id="progressBar" aria-hidden="true">
              <span class="progress__fill" id="progressFill"></span>
            </div>
            <div class="controls">
              <div class="transport">
                <!-- Previous / Play-Pause / Next controls -->
                <button
                  type="button"
                  id="prevButton"
                  aria-label="Play previous track"
                  title="Previous"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M17.5 5.5a1 1 0 0 0-1.5-.87L7 10.3a1 1 0 0 0 0 1.74l8.98 5.68A1 1 0 0 0 17.5 17V5.5z"
                    />
                    <rect x="4" y="5" width="2" height="14" rx="0.6" />
                  </svg>
                </button>
                <button
                  type="button"
                  id="playPauseButton"
                  aria-label="Play"
                  title="Play/Pause"
                >
                  <span id="playPauseIcon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                      <path d="M8 5v14l11-7z" />
                    </svg>
                  </span>
                </button>
                <button
                  type="button"
                  id="nextButton"
                  aria-label="Play next track"
                  title="Next"
                >
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      d="M6.5 5.5a1 1 0 0 1 1.5-.87L18 10.3a1 1 0 0 1 0 1.74l-9.98 5.68A1 1 0 0 1 6.5 17V5.5z"
                    />
                    <rect x="18" y="5" width="2" height="14" rx="0.6" />
                  </svg>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="player-scrim" aria-hidden="true"></div>

      <!-- populated from config/player.json "links"; stays hidden when empty -->
      <nav class="site-links" id="siteLinks" aria-label="Artist links" hidden></nav>
    </main>
    <audio
      id="audioElement"
      class="audio-source"
      preload="metadata"
      hidden
      aria-hidden="true"
    ></audio>

    <script src="app.js" defer></script>

  </body>
</html>
